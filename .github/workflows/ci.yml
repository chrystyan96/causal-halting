name: causal-halting-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Python tests
        run: python -m unittest discover -s tests
      - name: Install package locally
        run: python -m pip install -e .
      - name: Run CLI smoke tests
        run: |
          chc version
          chc check examples/diagonal.graph --format json
          chc check examples/qe-valid-acyclic.chc --format json
          chc design examples/self-prediction.design-ir.json --format json
          chc trace examples/self-prediction.trace.jsonl --format json
          chc process examples/process-self-feedback.process-ir.json --format json
          chc temporal examples/temporal-self-feedback.trace.jsonl --format json
          chc prediction examples/prediction-self-risk.prediction-ir.json --format json
          chc demo --output .tmp/demo --format json
          chc eval evals/v4 --format json
      - name: Validate JSON manifests and schemas
        run: |
          python -m json.tool .codex-plugin/plugin.json >/dev/null
          python -m json.tool hooks/hooks.json >/dev/null
          for f in schemas/*.json; do python -m json.tool "$f" >/dev/null; done
          for f in examples/demo/*.json; do python -m json.tool "$f" >/dev/null; done
      - name: Optional Lean build
        shell: bash
        run: |
          if command -v lake >/dev/null 2>&1; then
            cd formal/lean
            lake build
          else
            echo "Lake not installed; skipping optional Lean build."
          fi
